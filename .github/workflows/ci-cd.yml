name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: apps/api

      - name: Run Prisma generate
        run: npx prisma generate
        working-directory: apps/api

      - name: Type check
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Lint
        run: npm run lint || true
        working-directory: apps/api

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kanban
          POSTGRES_PASSWORD: kanban
          POSTGRES_DB: kanban_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: apps/api

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Run database migrations
        run: npx prisma db push
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://kanban:kanban@localhost:5432/kanban_test
          REDIS_URL: redis://localhost:6379

      - name: Run tests
        run: npx vitest run
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://kanban:kanban@localhost:5432/kanban_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/api

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Build
        run: npm run build
        working-directory: apps/api

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: apps/api/dist

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: false
          tags: kanban-api:${{ github.sha }}
          load: true

      - name: Run health check
        run: |
          docker run -d --name test-api --publish 4000:3001 kanban-api:${{ github.sha }}
          sleep 10
          curl -f http://localhost:4000/health || exit 1
          docker rm -f test-api

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Deploy to staging
        run: echo "Deploying to staging (configure your deployment target)"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy to production
        run: echo "Deploying to production (configure your deployment target)"